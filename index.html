<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frieden und Unfrieden in China</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    /* hier hintergrund */
    background-image:url(Bilder/Background.png);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);

    color:white;
    font-size:3.5rem;
    text-align:center;

    text-shadow:
    0 0 10px rgba(0,0,0,0.8),
    0 0 20px rgba(0,0,0,0.8);
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    flex-wrap:wrap;
}

.card{
    width:350px;
    height:220px;

    position:relative;

    overflow:hidden;
    border-radius:20px;

    text-decoration:none;

    transition:0.3s ease;

    box-shadow:
    0 10px 25px rgba(0,0,0,0.4);
}

.card:hover{
    transform:scale(1.08);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;

    /* hier bild */
}

.overlay{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.65);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:1.8rem;
    font-weight:bold;

    text-align:center;
    padding:20px;

    opacity:0;
    transition:0.3s ease;
}

.card:hover .overlay{
    opacity:1;
}

@media(max-width:1200px){

    .container{
        gap:25px;
    }

    .card{
        width:280px;
        height:180px;
    }

    h1{
        font-size:2.5rem;
    }
}

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .container{
        flex-direction:column;
        margin-top:120px;
        margin-bottom:40px;
    }

    .card{
        width:90%;
        max-width:350px;
    }
}
</style>
</head>

<body>

<h1>Frieden und Unfrieden in China</h1>

<div class="container">

    <a href="JanA.html" class="card">

        <!-- hier bild 1 -->
        <img src="Bilder/Kultur.png" alt="Gesellschaftliche Aspekte">

        <div class="overlay">
            Gesellschaftliche Aspekte
        </div>

    </a>

    <a href="Christian.html" class="card">

        <!-- hier bild 2 -->
        <img src="Bilder/Überwachung.png" alt="Technologische Aspekte">

        <div class="overlay">
            Technologische Aspekte
        </div>

    </a>

    <a href="Jonathan.html" class="card">

        <!-- hier bild 3 -->
        <img src="Bilder/Politik.png" alt="Wirtschaftlich Politische Aspekte">

        <div class="overlay">
            Wirtschaftlich Politische Aspekte
        </div>

    </a>

</div>

</body>
</html>
